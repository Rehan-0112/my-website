<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rehan Shaikh's Website</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body, html {
      height: 100%;
      width: 100%;
      overflow-x: hidden;
    }

    /* Full-screen graffiti-style background */
    body {
      background: url('https://4kwallpapers.com/images/wallpapers/macos-big-sur-apple-layers-fluidic-colorful-wwdc-stock-4096x2304-1455.jpg') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 20px 50px;
      position: fixed;
      top: 0;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      color: white;
      z-index: 10;
    }

    header h1 {
      font-weight: 600;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }

    nav a:hover {
      text-decoration: underline;
    }

    /* Frosted glass hero section */
    .hero {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 50px 30px;
      text-align: center;
      max-width: 600px;
      margin-top: 120px;
      color: white;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }

    .hero h2 {
      font-size: 2.8rem;
      margin-bottom: 15px;
      text-shadow: 1px 1px 6px rgba(0,0,0,0.6);
    }

    .hero p {
      font-size: 1.2rem;
      margin-bottom: 25px;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
    }

    .btn {
      padding: 12px 25px;
      background: rgba(255,255,255,0.8);
      color: #333;
      border-radius: 25px;
      text-decoration: none;
      display: inline-block;
      transition: 0.3s;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .btn:hover {
      background: rgba(255,255,255,1);
    }

    /* Footer */
    footer {
      margin-top: 50px;
      border-radius: 10px;
      padding: 15px;
      color: #ddd;
      text-align: center;
      font-weight: 600;
      backdrop-filter: blur(10px);
    }

    /* Artwork overlay in background */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://images.unsplash.com/photo-1587620931246-9643cfa7c6d1?auto=format&fit=crop&w=1500&q=80');
      background-size: cover;
      background-position: center;
      opacity: 0.2;
      z-index: 0;
    }

  </style>
</head>
<body>

<header>
  <h1>Rehan Shaikh</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Welcome to Rehan Shaikh's Website</h2>
  <p> I am a B.Tech Data Science Student with a Creative edge.</p>
  <a href="#" class="btn" onclick="showMessage()">Click Me</a>
</section>

<footer>
  © 2026 Rehan Shaikh
</footer>

<script>
  function showMessage() {
    alert("🔥 Rehan Shaikh's glass-style website looks amazing!");
  }
</script>

</body>
</html>
