<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My First Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
    }
    header {
      background: #333;
      color: white;
      padding: 15px;
    }
    main {
      margin-top: 50px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <h1>Welcome to My Website</h1>
</header>

<main>
  <p>This is my first website hosted on GitHub 🚀</p>
  <button onclick="showMessage()">Click Me</button>
</main>

<script>
  function showMessage() {
    alert("Hello! Your site is working 🎉");
  }
</script>

</body>
</html>
